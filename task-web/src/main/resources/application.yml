server:
  port: 8086
  shutdown: graceful

spring:
  application:
    name: secure-multimodule-springboot-java21

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    java:
      enabled: true
    os:
      enabled: true

info:
  app:
    name: secure-multimodule-springboot-java21
    description: Java 21 Spring Boot multi-module demo with OSS dependency guardrails.
    security-model: no intentionally vulnerable dependencies; opt-in SCA and SBOM profiles
